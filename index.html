<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Espelho Planilha</title>

<style>

body{
margin:0;
background:#dcdcdc;
font-family:Arial;
}

.container{
height:100vh;
overflow:auto;
}

table{
border-collapse:collapse;
}

td{
border:1px solid #222;
padding:6px;
white-space:pre-wrap;
}

</style>

</head>

<body>

<div class="container">
<table id="tabela"></table>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxzh31kH7TO_938vumxjTBMziHy3q_-yuR4MGLmHVMWfvWTanRRTs0-F-DZziPG3EUz/exec";

async function carregar(){

const resp = await fetch(API);
const data = await resp.json();

const tabela=document.getElementById("tabela");
tabela.innerHTML="";

/* cria linhas */
data.valores.forEach((linha,i)=>{

let tr=document.createElement("tr");

linha.forEach((cel,j)=>{

let td=document.createElement("td");

td.innerText=cel;

td.style.background=data.fundos[i][j];
td.style.color=data.cores[i][j];
td.style.textAlign=data.alinhamento[i][j];
td.style.fontWeight=data.fontes[i][j];
td.style.fontSize=data.tamanhos[i][j]+"px";

td.dataset.row=i+1;
td.dataset.col=j+1;

tr.appendChild(td);

});

tabela.appendChild(tr);

});

/* largura colunas */
data.larguras.forEach((w,i)=>{
document.querySelectorAll(
`td:nth-child(${i+1})`
).forEach(td=>{
td.style.minWidth=w+"px";
});
});

/* merges */
data.merges.forEach(m=>{

let cell=document.querySelector(
`td[data-row="${m.row}"][data-col="${m.col}"]`
);

if(cell){
cell.rowSpan=m.rows;
cell.colSpan=m.cols;

for(let r=0;r<m.rows;r++){
for(let c=0;c<m.cols;c++){

if(r==0 && c==0) continue;

let remove =
document.querySelector(
`td[data-row="${m.row+r}"][data-col="${m.col+c}"]`
);

if(remove) remove.remove();
}
}
}

});

}

carregar();
setInterval(carregar,5000);

</script>

</body>
</html>
